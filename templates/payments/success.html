{% extends 'base.html' %}

{% block title %}Payment Successful - ServiceMarket{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="card shadow d-inline-block p-5">
        <div class="card-body">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
            <h2 class="mt-3">Payment Successful!</h2>
            <p class="lead">Thank you for your payment.</p>
            <p>Transaction ID: {{ payment.transaction_id }}</p>
            <hr>
            <a href="{% url 'customer_bookings' %}" class="btn btn-primary">Go to My Bookings</a>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary">Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
