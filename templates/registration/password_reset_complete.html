{% extends 'base.html' %}

{% block title %}Password Reset Complete - ServiceMarket{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center border-success">
                <div class="card-body p-5">
                    <i class="bi bi-check-circle fs-1 text-success mb-3"></i>
                    <h2 class="card-title">Password Reset Complete!</h2>
                    <p class="lead mt-3">Your password has been successfully reset. You may now log in with your new
                        password.</p>
                    <div class="mt-4">
                        <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5">Login Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
